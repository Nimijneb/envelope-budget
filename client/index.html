<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <link rel="icon" href="/envelope.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/envelope.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#faf8f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ebb and Flow" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
    <meta name="color-scheme" content="light dark" />
    <title>Ebb and Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var k = "envelope-budget-theme";
          var s = localStorage.getItem(k);
          if (s === "dark") document.documentElement.classList.add("dark");
          else if (s === "light") document.documentElement.classList.remove("dark");
          else if (window.matchMedia("(prefers-color-scheme: dark)").matches)
            document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme =
            document.documentElement.classList.contains("dark") ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
